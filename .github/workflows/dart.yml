name: Build macOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build macOS
    runs-on: macos-latest
    outputs:
      binary-artifact: ${{ steps.binary-artifact.outputs.artifact-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v4.2.0
        with:
          versionSpec: '6.4.x'

      - name: Calculate Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.2.0
        with:
          overrideConfig: |
            assembly-versioning-scheme=MajorMinorPatchTag
            assembly-file-versioning-format="{Major}.{Minor}.{Patch}.{BuildMetaData ?? 0}"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore dependencies
        run: flutter pub get --no-example --enforce-lockfile

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build project
        run: |-
          flutter build macos \
            --no-pub \
            --build-name=${{ steps.gitversion.outputs.majorMinorPatch }} \
            --build-number=${{ steps.gitversion.outputs.buildMetaData }}

      - name: Create DMG
        run: |-
          cd build/macos/Build/Products/Release
          mkdir -p dmg
          cp -R "pixez.app" dmg/
          ln -sf /Applications dmg/Applications
          hdiutil create -volname "Pixez" \
            -srcfolder dmg \
            -ov -format UDZO \
            pixez-macos.dmg

      - name: Upload artifact
        id: binary-artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixez-macos
          path: build/macos/Build/Products/Release/pixez-macos.dmg
          compression-level: 9

      - name: Generate checksum
        run: |-
          echo '### Build Success :rocket:' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '|File|SHA256|' >> $GITHUB_STEP_SUMMARY
          echo '|:-|:-:|' >> $GITHUB_STEP_SUMMARY
          echo "|[pixez-macos.dmg](${{ steps.binary-artifact.outputs.artifact-url }})|${{ steps.binary-artifact.outputs.artifact-digest }}|" >> $GITHUB_STEP_SUMMARY

  publish:
    needs: build
    name: Publish
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      discussions: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pixez-macos
          path: artifacts

      - name: Rename artifact
        run: |-
          mv artifacts/pixez-macos.dmg artifacts/pixez.macos-amd64.dmg

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
