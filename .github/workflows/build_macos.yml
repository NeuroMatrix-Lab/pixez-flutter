name: Build macOS
on:
  workflow_dispatch: {}
jobs:
  Build_macOS:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter --version
      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop
      - name: Create rhttp directory structure to resolve dependency
        run: |
          mkdir -p ../rhttp/rhttp/lib
          cat > ../rhttp/rhttp/pubspec.yaml << 'EOF'
          name: rhttp
          description: A new Dart package
          version: 0.0.1
          environment:
            sdk: ">=3.0.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
          EOF
      - name: Add macOS platform to existing project
        run: flutter create --platforms=macos .
      - run: flutter pub get
      - run: flutter packages pub run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: pixez-macos
          path: build/macos/Build/Products/Release/pixez.app
